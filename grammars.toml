# Bonsai language registry
# Maps language names to their tree-sitter grammar submodules.
# The build system (crates/bonsai-core/build.rs) reads this file
# to compile grammars and generate the language lookup module.
#
# Optional fields:
#   supertypes  — path to supertypes.scm for compatibility checking
#   locals      — path to locals.scm for scope-aware transforms (identifier unification, dead def removal)

[[language]]
name = "python"
grammar = "grammars/tree-sitter-python"
extensions = ["py", "pyi"]
src = "src"
# supertypes = "queries/supertypes.scm"
# locals = "queries/locals.scm"  # not shipped in this submodule; available from nvim-treesitter

[[language]]
name = "javascript"
grammar = "grammars/tree-sitter-javascript"
extensions = ["js", "mjs", "cjs"]
src = "src"
locals = "queries/locals.scm"

[[language]]
name = "rust"
grammar = "grammars/tree-sitter-rust"
extensions = ["rs"]
src = "src"
# locals = "queries/locals.scm"  # not shipped in this submodule; available from nvim-treesitter
