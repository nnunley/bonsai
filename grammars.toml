# Bonsai language registry
# Maps language names to their tree-sitter grammar submodules.
# The build system (crates/bonsai-core/build.rs) reads this file
# to compile grammars and generate the language lookup module.

[[language]]
name = "python"
grammar = "grammars/tree-sitter-python"
extensions = ["py", "pyi"]
src = "src"
# supertypes = "queries/supertypes.scm"  # optional, uncomment when available

[[language]]
name = "javascript"
grammar = "grammars/tree-sitter-javascript"
extensions = ["js", "mjs", "cjs"]
src = "src"

[[language]]
name = "rust"
grammar = "grammars/tree-sitter-rust"
extensions = ["rs"]
src = "src"
