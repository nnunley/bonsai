# Bonsai language registry
# Maps language names to their tree-sitter grammar submodules.
# The build system (crates/bonsai-core/build.rs) reads this file
# to compile grammars and generate the language lookup module.
#
# Supertypes are extracted at runtime via Language::supertypes() —
# no manual configuration needed.
#
# Optional fields:
#   queries — path to directory containing .scm query files (locals.scm, tags.scm, etc.)

[[language]]
name = "python"
grammar = "grammars/tree-sitter-python"
extensions = ["py", "pyi"]
src = "src"
queries = "queries/python"

[[language]]
name = "javascript"
grammar = "grammars/tree-sitter-javascript"
extensions = ["js", "mjs", "cjs"]
src = "src"
queries = "queries/javascript"

[[language]]
name = "rust"
grammar = "grammars/tree-sitter-rust"
extensions = ["rs"]
src = "src"
queries = "queries/rust"
